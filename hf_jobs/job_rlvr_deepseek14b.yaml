name: corp-env-rlvr-deepseek-14b
flavor: a100-large
env:
  HF_HUB_ENABLE_HF_TRANSFER: "1"
  TOKENIZERS_PARALLELISM: "false"
command: >-
  pip install -U pip &&
  pip install -e .[training] &&
  python training/train_rlvr_genral.py
  --model deepseek-ai/DeepSeek-R1-Distill-Qwen-14B
  --adapter outputs/sft_deepseek_14b
  --dataset-repo Navigam/corp-env-data
  --examples-files e1_m1_clean.jsonl,h1_seed_clean.jsonl
  --output outputs/rlvr_deepseek_14b
  --hf-user Navigam
  --strict-json
  --rounds 3
  --n-samples 8
  --max-prompts 128
  --stats-file results/runs/rlvr_deepseek_14b.jsonl
